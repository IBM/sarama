name: OffsetFetch Batch Repro
on:
  pull_request:
    branches:
    - "**"
    paths:
    - admin.go
    - broker.go
    - functional_admin_test.go
    - .github/workflows/offset-fetch-batch-repro.yml

permissions:
  contents: read

env:
  GOTOOLCHAIN: local

jobs:
  repro:
    name: Kafka 4.2 focused FVT
    runs-on: ubuntu-latest
    env:
      DEBUG: true
      GOFLAGS: -trimpath
      KAFKA_VERSION: 4.2.0
      SCALA_VERSION: 2.13
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Setup Docker
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      id: buildx
    - name: Build FVT Docker Image
      uses: docker/bake-action@a66e1c87e2eca0503c343edf1d208c716d54b8a8 # v7.1.0
      with:
        builder: ${{ steps.buildx.outputs.name }}
        files: docker-compose.yml
        load: true
        targets: kafka-1
        set: |
          *.cache-from=type=gha,scope=fvt-kafka-${{ env.KAFKA_VERSION }}
          *.cache-to=type=gha,scope=fvt-kafka-${{ env.KAFKA_VERSION }},mode=max
    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: stable
    - name: Setup Docker Compose
      run: |
        curl --fail -sSL "https://github.com/docker/compose/releases/download/v2.32.1/docker-compose-$(uname -s)-$(uname -m)" -o /tmp/docker-compose
        mkdir -p $HOME/.docker/cli-plugins
        install -m755 /tmp/docker-compose $HOME/.docker/cli-plugins
        docker version --format 'Docker Engine version v{{.Server.Version}}'
        docker compose version
    - name: Run focused functional test
      run: |
        go test -tags=functional -run '^TestFuncAdminListConsumerGroupOffsetsBatchWithNewerBrokerApiVersion$' -count=1 -timeout 10m -v
