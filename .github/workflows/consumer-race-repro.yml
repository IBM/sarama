name: Consumer Race Repro
on:
  pull_request:
    branches:
    - "**"
    paths:
    - ".github/workflows/consumer-race-repro.yml"
    - "consumer.go"
    - "consumer_test.go"

permissions:
  contents: read # for actions/checkout to fetch code

env:
  GOTOOLCHAIN: local

jobs:
  race-repro:
    name: Reproduce partition consumer broker race
    runs-on: ubuntu-latest
    env:
      DEBUG: true
      GOFLAGS: -trimpath
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Setup Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: oldstable
    - name: Test (Race Repro)
      run: go test -race -run '^TestPartitionConsumerBrokerRace$' .
