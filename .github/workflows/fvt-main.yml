name: FVT (main)
on:
  merge_group:
  push:
    branches:
    - main
    paths-ignore:
    - '**/*.md'

permissions:
  contents: read  # for actions/checkout to fetch code

env:
  # Use the Go toolchain installed by setup-go
  GOTOOLCHAIN: local

jobs:
  fvt:
    name: Test with Kafka ${{ matrix.kafka-version }}
    strategy:
      fail-fast: false
      matrix:
        go-version: [stable]
        kafka-version:
        - 1.0.2   # oldest baseline, lowest protocol versions
        - 2.6.3   # accumulates many 2.x protocol bumps (KIP-227, KIP-320, KIP-345, KIP-429)
        - 2.8.2   # KRaft experimental era (KIP-500)
        - 3.0.2   # major deprecation wave, removed old message formats
        - 3.3.2   # KRaft production-ready (KIP-833)
        - 3.6.2   # mid-3.x representative
        - 3.9.2   # last ZooKeeper-capable release
        - 4.1.1   # stable KRaft-only (post-4.0 transition)
        - 4.2.0   # latest
        include:
        - kafka-version: 1.0.2
          scala-version: 2.11
        - kafka-version: 2.6.3
          scala-version: 2.12
        - kafka-version: 2.8.2
          scala-version: 2.12
        - kafka-version: 3.0.2
          scala-version: 2.12
        - kafka-version: 3.3.2
          scala-version: 2.13
        - kafka-version: 3.6.2
          scala-version: 2.13
        - kafka-version: 3.9.2
          scala-version: 2.13
        - kafka-version: 4.1.1
          scala-version: 2.13
        - kafka-version: 4.2.0
          scala-version: 2.13
    uses: ./.github/workflows/fvt.yml
    with:
      go-version: ${{ matrix.go-version }}
      kafka-version: ${{ matrix.kafka-version }}
      scala-version: ${{ matrix.scala-version }}
