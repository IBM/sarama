name: Txn Produce Commit Offset Repro (PR)
on:
  pull_request:
    branches:
    - "**"
    paths-ignore:
    - '**/*.md'
  workflow_dispatch:

permissions:
  contents: read # for actions/checkout to fetch code

env:
  # Use the Go toolchain installed by setup-go
  GOTOOLCHAIN: local

jobs:
  repro:
    name: Reproduce pending redispatch shutdown deadlock
    runs-on: ubuntu-latest
    env:
      DEBUG: true
      GOFLAGS: -trimpath
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Setup Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version: stable
    - name: Test repro
      run: go test ./... -run '^TestPartitionConsumerAsyncCloseAfterRedispatchExitsDispatcher$' -count=1
