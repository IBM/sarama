name: Client Metadata Concurrent Refresh Repro

on:
  workflow_dispatch:
  pull_request:
    branches:
    - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GOTOOLCHAIN: local
  GOFLAGS: -trimpath

jobs:
  test:
    name: TestClientRefreshesMetadataConcurrently x100
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: stable
    - name: Run concurrent refresh repro loop
      shell: bash
      run: |
        set -euo pipefail
        for i in $(seq 1 100); do
          echo "===== iteration ${i}/100 ====="
          go test -race -count=1 -run '^TestClientRefreshesMetadataConcurrently$' -v .
        done
